```yaml
services:
  nutrihelp-api:
    image: nutrihelp-api:${APP_VERSION:-latest}

    ports:
      - "80:3000"

    environment:
      NODE_ENV: production
      PORT: 3000
      APP_VERSION: ${APP_VERSION:-1.0.0}

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "http://localhost:3000/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    deploy:
      replicas: 2

      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

      resources:
        limits:
          cpus: "0.50"
          memory: 256M

        reservations:
          cpus: "0.25"
          memory: 128M

    restart: unless-stopped

    networks:
      - nutrihelp-prod-network

  prometheus:
    image: prom/prometheus:v2.47.0

    container_name: nutrihelp-prometheus-prod

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-prod-data:/prometheus

    restart: unless-stopped

    networks:
      - nutrihelp-prod-network

  grafana:
    image: grafana/grafana:10.1.0

    container_name: nutrihelp-grafana-prod

    ports:
      - "3001:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-nutrihelp_prod_123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/"

    volumes:
      - grafana-prod-data:/var/lib/grafana
      - ./prometheus/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro

    restart: unless-stopped

    networks:
      - nutrihelp-prod-network

volumes:
  prometheus-prod-data:
  grafana-prod-data:

networks:
  nutrihelp-prod-network:
    driver: bridge
```
