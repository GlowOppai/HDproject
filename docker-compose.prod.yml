services:
  nutrihelp-api:
    image: nutrihelp-api:${APP_VERSION:-latest}
    ports:
      - "80:3000"

    environment:
      NODE_ENV: production
      PORT: 3000
      APP_VERSION: ${APP_VERSION:-1.0.0}

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health',(r)=>process.exit(r.statusCode===200?0:1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    restart: always

    networks:
      - nutrihelp-prod-network

  prometheus:
    image: prom/prometheus:v2.47.0

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-prod-data:/prometheus

    restart: always

    networks:
      - nutrihelp-prod-network

  grafana:
    image: grafana/grafana:10.1.0

    ports:
      - "3001:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-nutrihelp_prod_123}
      GF_USERS_ALLOW_SIGN_UP: "false"

    volumes:
      - grafana-prod-data:/var/lib/grafana
      - ./prometheus/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro

    restart: always

    networks:
      - nutrihelp-prod-network

volumes:
  prometheus-prod-data:
  grafana-prod-data:

networks:
  nutrihelp-prod-network:
    driver: bridge
