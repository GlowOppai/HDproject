# SonarQube Configuration for NutriHelp API
# ─────────────────────────────────────────

# Project identification
sonar.projectKey=nutrihelp-api
sonar.projectName=NutriHelp API
sonar.projectVersion=1.0.0

# Source & test paths
sonar.sources=src
sonar.tests=tests
sonar.inclusions=src/**/*.js
sonar.exclusions=node_modules/**,coverage/**,**/*.test.js

# Test coverage reports (generated by Jest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Language
sonar.language=js

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gates
# Requires:
#   - Coverage >= 70%
#   - Duplicated lines <= 3%
#   - Maintainability rating >= A (technical debt ratio < 5%)
#   - Reliability rating >= A (0 bugs)
#   - Security rating >= A (0 vulnerabilities)

# Code smell thresholds (custom)
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S1135
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.test.js
