global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alerting rules
rule_files:
  - "alert_rules.yml"

# Alertmanager configuration (optional - configure if you have alertmanager)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # NutriHelp API metrics
  - job_name: 'nutrihelp-api'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['nutrihelp-api:3000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.+):.*'
        replacement: '${1}'
