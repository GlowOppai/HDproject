version: '3.8'

services:
  # ──────────────────────────────────────────────
  # NutriHelp API (staging)
  # ──────────────────────────────────────────────
  nutrihelp-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: nutrihelp-staging
    image: nutrihelp-api:${APP_VERSION:-latest}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: staging
      PORT: 3000
      APP_VERSION: ${APP_VERSION:-1.0.0}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - nutrihelp-network

  # ──────────────────────────────────────────────
  # Prometheus (metrics collection)
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: nutrihelp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - nutrihelp-network
    depends_on:
      - nutrihelp-api

  # ──────────────────────────────────────────────
  # Grafana (dashboards & alerting)
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.1.0
    container_name: nutrihelp-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: nutrihelp123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./prometheus/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    restart: unless-stopped
    networks:
      - nutrihelp-network
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:

networks:
  nutrihelp-network:
    driver: bridge
